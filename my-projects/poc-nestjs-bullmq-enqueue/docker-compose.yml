services:
  redis:
    image: redis:7-alpine
    container_name: poc-bullmq-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: poc-bullmq-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Credenciais do dashboard /queues (vazio = liberado).
      QUEUES_USER: ${QUEUES_USER:-}
      QUEUES_PASS: ${QUEUES_PASS:-}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
